# Active consumer — token is issued immediately on creation.
apiVersion: kubeflag.io/v1alpha1
kind: Consumer
metadata:
  name: team-alpha
spec:
  tenantRef: ctf-2026
  description: "Team Alpha API consumer"

---

# Consumer with a hard expiry — the JWT exp claim will match this timestamp.
apiVersion: kubeflag.io/v1alpha1
kind: Consumer
metadata:
  name: team-beta
spec:
  tenantRef: ctf-2026
  description: "Team Beta API consumer (expires end of competition)"
  expiresAt: "2026-12-31T23:59:59Z"

---

# Suspended consumer — phase is set to Suspended, no token is issued.
apiVersion: kubeflag.io/v1alpha1
kind: Consumer
metadata:
  name: team-gamma
spec:
  tenantRef: ctf-2026
  description: "Team Gamma API consumer (suspended)"
  suspended: true
