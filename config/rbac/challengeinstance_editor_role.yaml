# permissions for end users to edit challengeinstances.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubeflag
    app.kubernetes.io/managed-by: kustomize
  name: challengeinstance-editor-role
rules:
- apiGroups:
  - kubeflag.io
  resources:
  - challengeinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubeflag.io
  resources:
  - challengeinstances/status
  verbs:
  - get
