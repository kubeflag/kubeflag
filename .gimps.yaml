importOrder: [std, external, kubeflag, kubernetes]
sets:
  - name: kubeflag
    patterns:
      - 'github.com/kubeflag/**'
  - name: kubernetes
    patterns:
      - 'k8s.io/**'
      - '*.k8s.io/**'