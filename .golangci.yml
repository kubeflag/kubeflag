version: "2"
run:
  # concurrency=1 lowers memory usage a bit
  concurrency: 1
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - depguard
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - godot
    - govet
    - importas
    - ineffassign
    - misspell
    - noctx
    - nolintlint
    - nosprintfhostport
    - predeclared
    - promlinter
    - staticcheck
    - unconvert
    - unused
    - wastedassign
    - whitespace

  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: io/ioutil
              desc: https://go.dev/doc/go1.16#ioutil
            - pkg: github.com/ghodss/yaml
              desc: use sigs.k8s.io/yaml instead
    goconst:
      min-occurrences: 5
    govet:
      enable:
        - nilness # find tautologies / impossible conditions
    importas:
      alias:
        - pkg: github.com/kubeflag/kubeflag/pkg/apis/v1alpha1
          alias: v1alpha1
        - pkg: github.com/kubeflag/kubeflag/pkg/util/errors
          alias: utilerrors
        # Kubernetes
        - pkg: k8s.io/api/(\w+)/(v[\w\d]+)
          alias: $1$2
        - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
          alias: metav1
        - pkg: k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1
          alias: apiextensionsv1
        - pkg: k8s.io/apimachinery/pkg/api/errors
          alias: apierrors
        - pkg: k8s.io/apimachinery/pkg/util/errors
          alias: kerrors
        # Controller Runtime
        - pkg: sigs.k8s.io/controller-runtime/pkg/client
          alias: ctrlruntimeclient
        - pkg: sigs.k8s.io/controller-runtime/pkg/client/fake
          alias: ctrlruntimefakeclient
        # Misc
        - pkg: github.com/Masterminds/semver/v3
          alias: semverlib

      no-unaliased: true
    staticcheck:
      checks:
        - all
        # disable "error strings should not be capitalized":
        # but often errors start with k8s kinds and it's annoying to rephrase every error
        - '-ST1005'
  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    # NOTE: Do not use commas in the exclude patterns, or else the regex will be
    # split and you will be sad: https://github.com/golangci/golangci-lint/issues/665
    rules:
      - path: (.+)\.go$
        text: singleCaseSwitch # in most cases this is the beginning of a lookup table and should be kept an obvious table
      - linters:
          - goconst
        path: (.+)_test\.go
    paths:
      - zz_generated.*.go

issues:
  # defaults to 3, which often needlessly hides issues and forces
  # to re-run the linter across the entire repo many times
  max-same-issues: 0

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - zz_generated.*.go